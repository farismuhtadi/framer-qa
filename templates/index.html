<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Framer QA</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='250' height='250' viewBox='0 0 250 250' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='250' height='250' rx='48' fill='%23070707'/%3E%3Cpath d='M175.24 94.6419C175.24 63.3188 154.171 54 113.301 54H69V195H93.3096V135.636H116.898C119.418 135.636 121.846 135.636 124.192 135.452L153.541 194.992H181L149.131 130.977C166.595 124.949 175.24 112.709 175.24 94.6335V94.6419ZM117.528 116.008H93.4008V73.813H116.724C135.903 73.813 150.308 76.3736 150.308 94.8182C150.308 111.71 138.423 116.008 117.536 116.008H117.528Z' fill='%23FAFAFA'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ───────────────────────────────────────────────────── */
:root {
  --bg:        #eaecf0;
  --surface:   #ffffff;
  --surface2:  #f9fafb;
  --border:    #e4e7ec;
  --border2:   #d0d5dd;
  --text:      #101828;
  --muted:     #667085;
  --muted2:    #344054;
  --pass:      #12b76a;
  --warn:      #f79009;
  --fail:      #f04438;
  --accent:    #101828;
  --accent-h:  #1d2939;
  --accent-light: #f2f4f7;
  --radius:    12px;
  --radius-sm: 8px;
  --shadow:    0 4px 16px rgba(16,24,40,.08), 0 1px 4px rgba(16,24,40,.04);
  --shadow-sm: 0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, select { font: inherit; }
button { cursor: pointer; }

/* ── Layout ──────────────────────────────────────────────────────────────── */
.app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-sm);
}
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: -0.3px; }
.logo-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
}
.header-nav { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 10px; }
.nav-btn {
  padding: 5px 14px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--muted2);
  font-size: 12.5px; font-weight: 500;
  transition: all .15s;
}
.nav-btn:hover { color: var(--text); background: rgba(0,0,0,.04); }
.nav-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); font-weight: 600; }

/* ── Main ────────────────────────────────────────────────────────────────── */
main {
  display: grid;
  grid-template-columns: 360px 1fr;
  height: calc(100vh - 58px);
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px 20px 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  background: var(--surface);
}
.form-section { display: flex; flex-direction: column; gap: 10px; }
.section-label {
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px;
  color: var(--muted);
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 500; color: var(--muted2); }
.field label .req { color: var(--fail); margin-left: 2px; }

input[type=text], input[type=url], input[type=number], input[type=password] {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(16,24,40,.1); }
input::placeholder { color: var(--muted); }

.help-text { font-size: 11px; color: var(--muted); line-height: 1.5; }
.help-text code { background: var(--surface2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; font-size: 11px; }

.divider { height: 1px; background: var(--border); }

/* ── Project selector ────────────────────────────────────────────────────── */
.project-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 6px;
  align-items: center;
}
.project-dropdown-wrap {
  position: relative;
}
.project-trigger {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  transition: border-color .15s, box-shadow .15s;
  white-space: nowrap;
  overflow: hidden;
}
.project-trigger:hover { border-color: var(--accent); }
.project-trigger .trigger-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--muted);
}
.project-trigger .trigger-text.has-value { color: var(--text); }
.project-trigger .trigger-arrow { color: var(--muted); font-size: 10px; flex-shrink: 0; }
.clear-project-btn {
  position: absolute;
  top: 50%; right: 28px;
  transform: translateY(-50%);
  background: transparent; border: none; padding: 2px 4px;
  color: var(--muted); font-size: 12px; line-height: 1;
  transition: color .15s; z-index: 1;
}
.clear-project-btn:hover { color: var(--fail); }

.project-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  z-index: 200;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.project-dropdown.open { display: flex; }
.project-search {
  padding: 8px 10px;
  border: none;
  border-bottom: 1px solid var(--border);
  border-radius: 0;
  background: var(--surface2);
  font-size: 12px;
}
.project-search:focus { border-color: var(--border); outline: none; box-shadow: none; }
.project-list { max-height: 180px; overflow-y: auto; }
.project-item {
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: background .1s;
  border-bottom: 1px solid var(--border);
}
.project-item:last-child { border-bottom: none; }
.project-item:hover { background: var(--accent-light); }
.project-empty { padding: 10px 12px; font-size: 12px; color: var(--muted); }

/* ── Project section card ────────────────────────────────────────────────── */
.project-section {
  background: var(--accent-light);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
}

.save-project-btn {
  padding: 8px 12px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--muted2);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  transition: all .15s;
}
.save-project-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.save-project-btn:disabled { opacity: .4; cursor: not-allowed; }
.delete-project-btn {
  padding: 8px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-size: 12px;
  transition: all .15s;
}
.delete-project-btn:hover { border-color: var(--fail); color: var(--fail); background: #fef2f2; }

/* ── Run button ──────────────────────────────────────────────────────────── */
.run-btn {
  padding: 12px 20px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff; font-weight: 700; font-size: 14px; width: 100%;
  transition: background .15s, transform .1s, box-shadow .15s;
  box-shadow: 0 2px 8px rgba(16,24,40,.2);
  letter-spacing: -0.2px;
}
.run-btn:hover { background: var(--accent-h); box-shadow: 0 4px 12px rgba(16,24,40,.25); }
.run-btn:active { transform: scale(.98); }
.run-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── Error banner ────────────────────────────────────────────────────────── */
.error-banner {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: var(--radius-sm);
  padding: 10px 14px; color: #f04438; font-size: 13px; display: none;
}
.error-banner.visible { display: block; }

/* ── Panel ───────────────────────────────────────────────────────────────── */
.panel { overflow: hidden; display: flex; flex-direction: column; background: var(--bg); }
.panel-view { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.panel-view.active { display: flex; }

.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; color: var(--muted); padding: 40px; text-align: center;
}
.empty-icon { font-size: 48px; opacity: .6; }
.empty-state h2 { font-size: 18px; color: var(--muted2); font-weight: 600; letter-spacing: -0.2px; }
.empty-state p { font-size: 14px; max-width: 460px; line-height: 1.7; color: var(--muted); }

/* ── Console ─────────────────────────────────────────────────────────────── */
.console-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  background: var(--surface);
}
.console-title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; color: var(--text); letter-spacing: -0.2px; }
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.progress-bar-wrap { height: 3px; background: var(--border); flex-shrink: 0; display: none; }
.progress-bar-wrap.visible { display: block; }
.progress-bar-fill {
  height: 100%; background: var(--accent);
  transition: width .5s ease; border-radius: 0 2px 2px 0;
}
.console-body {
  flex: 1; overflow-y: auto; padding: 16px 24px;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px; line-height: 1.8; background: #1e1e2e;
  color: #cdd6f4;
}
.log-line { color: #7c849a; word-break: break-word; display: flex; align-items: baseline; gap: 6px; }
.log-icon { width: 28px; flex-shrink: 0; text-align: left; }
.log-text { flex: 1; white-space: pre-wrap; }
.log-line.em   { color: #cdd6f4; }
.log-line.pass { color: #a6e3a1; }
.log-line.warn { color: #f9e2af; }
.log-line.fail { color: #f38ba8; }
.log-line.sep  { color: #313244; }
.console-footer { padding: 16px 24px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
.done-actions { display: flex; gap: 10px; align-items: center; }
.open-report-btn {
  padding: 10px 20px; background: var(--accent); border: none;
  border-radius: var(--radius-sm); color: #fff; font-weight: 600; font-size: 13px;
  transition: background .15s; box-shadow: 0 2px 6px rgba(16,24,40,.2);
}
.open-report-btn:hover { background: var(--accent-h); }
.new-check-btn {
  padding: 10px 20px; background: transparent;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  color: var(--muted2); font-size: 13px; transition: all .15s;
}
.new-check-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ── History ─────────────────────────────────────────────────────────────── */
.history-view { padding: 28px; overflow-y: auto; }
.history-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.2px; }
.history-empty { color: var(--muted); font-size: 14px; }
.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow-sm); transition: box-shadow .15s;
}
.history-item:hover { box-shadow: var(--shadow); }
.history-favicon {
  width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
  object-fit: contain;
}
.history-favicon-placeholder {
  width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--muted);
}
.history-item-left { overflow: hidden; flex: 1; min-width: 0; }
.history-item .site { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.history-item .date { font-size: 11px; color: var(--muted); margin-top: 2px; }
.history-item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.history-pills { display: flex; gap: 4px; align-items: center; }
.history-pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
.history-pill.pass { background: #ecfdf5; color: var(--pass); }
.history-pill.warn { background: #fffbeb; color: #d97706; }
.history-pill.fail { background: #fef2f2; color: #f04438; }
.history-status { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.history-status.done    { background: #ecfdf5; color: var(--pass); }
.history-status.running { background: var(--accent-light); color: var(--accent); }
.history-status.error   { background: #fef2f2; color: #f04438; }
.history-status.queued  { background: #fffbeb; color: #d97706; }
.history-report-btn {
  padding: 5px 12px; background: var(--accent-light);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--accent); font-size: 12px; font-weight: 500;
  white-space: nowrap; transition: all .15s;
}
.history-report-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.history-rerun-btn {
  padding: 5px 10px; background: none;
  border: 1px solid var(--border2); border-radius: 6px;
  color: var(--muted2); font-size: 12px; font-weight: 500;
  white-space: nowrap; transition: all .15s;
}
.history-rerun-btn:hover { border-color: var(--accent); color: var(--accent); }

@media (max-width: 768px) {
  main { grid-template-columns: 1fr; }
  .panel { display: none; }
  header { padding: 0 16px; }
  .sidebar { padding: 20px 16px; }
}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">
    <div class="logo-icon"><svg width="30" height="30" viewBox="0 0 250 250" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="250" fill="#070707"/><path d="M175.24 94.6419C175.24 63.3188 154.171 54 113.301 54H69V195H93.3096V135.636H116.898C119.418 135.636 121.846 135.636 124.192 135.452L153.541 194.992H181L149.131 130.977C166.595 124.949 175.24 112.709 175.24 94.6335V94.6419ZM117.528 116.008H93.4008V73.813H116.724C135.903 73.813 150.308 76.3736 150.308 94.8182C150.308 111.71 138.423 116.008 117.536 116.008H117.528Z" fill="#FAFAFA"/></svg></div>
    Framer QA
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="showTab('configure')">Configure</button>
    <button class="nav-btn" id="nav-running" onclick="showTab('running')" style="display:none">Running</button>
    <button class="nav-btn" id="nav-history" onclick="showTab('history'); loadHistory()" style="display:none">History</button>
  </nav>
</header>

<main>

<aside class="sidebar">

  <!-- ── Projects ── -->
  <div class="form-section project-section">
    <div class="section-label">Saved Project</div>
    <span class="help-text" style="margin-top:-4px">Load a saved project to fill all fields automatically.</span>
    <div class="project-row">
      <div class="project-dropdown-wrap" id="project-dropdown-wrap">
        <button class="project-trigger" id="project-trigger" onclick="toggleProjectDropdown(event)">
          <span class="trigger-text" id="trigger-text">Select a project…</span>
          <span class="trigger-arrow">▼</span>
        </button>
        <button class="clear-project-btn" id="clear-project-btn" onclick="clearCurrentProject(event)"
                title="Deselect project" style="display:none">✕</button>
        <div class="project-dropdown" id="project-dropdown">
          <input type="text" class="project-search" id="project-search"
                 placeholder="Search projects…" oninput="filterProjects(this.value)">
          <div class="project-list" id="project-list"></div>
        </div>
      </div>
      <button class="delete-project-btn" id="delete-project-btn" onclick="deleteCurrentProject()" title="Delete project" style="display:none">🗑</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ── Site ── -->
  <div class="form-section">
    <div class="section-label">Site</div>
    <div class="field">
      <label>Site URL <span class="req">*</span></label>
      <input type="url" id="site-url" placeholder="https://your-site.framer.website"
             autocomplete="off" oninput="updateSaveBtn()">
    </div>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <button class="save-project-btn" id="save-project-btn"
          onclick="saveCurrentProject()" disabled
          style="width:100%;padding:10px;font-size:13px">
    Save project
  </button>

  <button class="run-btn" id="run-btn" onclick="startJob()">Run QA Check</button>

</aside>

<!-- ── Right panel ── -->
<div class="panel">

  <div class="panel-view active" id="view-empty">
    <div class="empty-state">
      <div class="empty-icon"><svg width="48" height="48" viewBox="0 0 250 250" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="250" height="250" fill="#070707" rx="40"/><path d="M175.24 94.6419C175.24 63.3188 154.171 54 113.301 54H69V195H93.3096V135.636H116.898C119.418 135.636 121.846 135.636 124.192 135.452L153.541 194.992H181L149.131 130.977C166.595 124.949 175.24 112.709 175.24 94.6335V94.6419ZM117.528 116.008H93.4008V73.813H116.724C135.903 73.813 150.308 76.3736 150.308 94.8182C150.308 111.71 138.423 116.008 117.536 116.008H117.528Z" fill="#FAFAFA"/></svg></div>
      <h2>Ready to run</h2>
      <p>Fill in your site URL on the left and click <strong>Run QA Check</strong>.<br>Results will appear here.</p>
    </div>
  </div>

  <div class="panel-view" id="view-running">
    <div class="console-header">
      <div class="console-title">
        <div class="spinner" id="run-spinner"></div>
        <span id="run-title">Running QA check…</span>
      </div>
      <span id="run-progress-label" style="font-size:13px;color:var(--muted)">0%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:2%"></div>
    </div>
    <div class="console-body" id="console-body"></div>
    <div class="console-footer" id="console-footer" style="display:none">
      <div class="done-actions">
        <button class="open-report-btn" id="open-report-btn" onclick="openReport()">Open Report</button>
        <button class="new-check-btn" onclick="resetToForm()">New check</button>
        <span id="done-status" style="font-size:13px;color:var(--muted)"></span>
      </div>
    </div>
  </div>

  <div class="panel-view" id="view-history">
    <div class="history-view">
      <div class="history-title">Recent checks</div>
      <div id="history-content" class="history-empty">No checks yet.</div>
    </div>
  </div>

</div>
</main>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let currentJobId = null;
let pollTimer = null;
let logOffset = 0;
let currentReportUrl = null;
let currentProjectName = null;

// ── Projects (localStorage) ───────────────────────────────────────────────────
const STORAGE_KEY = 'framer_qa_projects';

function loadProjects() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function persistProjects(projects) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
    return true;
  } catch (e) {
    showToast('Could not save — localStorage may be blocked in this browser.', true);
    return false;
  }
}

function renderProjectList(filter = '') {
  const projects = loadProjects();
  const list = document.getElementById('project-list');
  const names = Object.keys(projects).filter(n =>
    n.toLowerCase().includes(filter.toLowerCase())
  ).sort();

  if (!names.length) {
    list.innerHTML = `<div class="project-empty">${filter ? 'No match found.' : 'No saved projects yet.'}</div>`;
    return;
  }
  list.innerHTML = names.map(name => `
    <div class="project-item" onclick="selectProject('${escHtml(name)}')">${escHtml(name)}</div>
  `).join('');
}

function toggleProjectDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('project-dropdown');
  const isOpen = dd.classList.contains('open');
  dd.classList.toggle('open', !isOpen);
  if (!isOpen) {
    renderProjectList();
    document.getElementById('project-search').value = '';
    document.getElementById('project-search').focus();
  }
}

function filterProjects(val) { renderProjectList(val); }

function selectProject(name) {
  const projects = loadProjects();
  const p = projects[name];
  if (!p) return;

  document.getElementById('site-url').value   = p.site_url || '';

  currentProjectName = name;
  savedState = getFormState();
  const t = document.getElementById('trigger-text');
  t.textContent = name;
  t.classList.add('has-value');
  document.getElementById('delete-project-btn').style.display = '';
  document.getElementById('clear-project-btn').style.display = '';
  document.getElementById('project-dropdown').classList.remove('open');
  updateSaveBtn();
}

function saveCurrentProject() {
  const name = prompt('Project name:', currentProjectName || '');
  if (!name || !name.trim()) return;
  const trimmed = name.trim();

  const projects = loadProjects();
  projects[trimmed] = getFormState();
  const ok = persistProjects(projects);
  if (!ok) return;

  currentProjectName = trimmed;
  savedState = getFormState();
  const t = document.getElementById('trigger-text');
  t.textContent = trimmed;
  t.classList.add('has-value');
  document.getElementById('delete-project-btn').style.display = '';
  document.getElementById('clear-project-btn').style.display = '';
  updateSaveBtn();
  showToast(`Project "${trimmed}" saved ✓`);
}

function deleteCurrentProject() {
  if (!currentProjectName) return;
  if (!confirm(`Delete project "${currentProjectName}"?`)) return;
  const projects = loadProjects();
  delete projects[currentProjectName];
  persistProjects(projects);
  currentProjectName = null;
  const t = document.getElementById('trigger-text');
  t.textContent = 'Select a project…';
  t.classList.remove('has-value');
  document.getElementById('delete-project-btn').style.display = 'none';
  document.getElementById('clear-project-btn').style.display = 'none';
}

function clearCurrentProject(e) {
  e.stopPropagation();
  currentProjectName = null;
  savedState = getFormState();
  const t = document.getElementById('trigger-text');
  t.textContent = 'Select a project…';
  t.classList.remove('has-value');
  document.getElementById('delete-project-btn').style.display = 'none';
  document.getElementById('clear-project-btn').style.display = 'none';
  updateSaveBtn();
  showToast('Project deselected — changes won\'t overwrite it');
}

function getFormState() {
  return {
    site_url:   document.getElementById('site-url').value.trim(),
    timeout_ms: 15000,
  };
}

// ── Dirty state tracking ──────────────────────────────────────────────────────
let savedState = null;

function updateSaveBtn() {
  const btn = document.getElementById('save-project-btn');
  const hasContent = !!document.getElementById('site-url').value.trim();
  btn.disabled = !hasContent;
  const name = currentProjectName ? `Save "${currentProjectName}"` : 'Save as new project';
  btn.textContent = name;
}

document.querySelector('.sidebar').addEventListener('input',  updateSaveBtn);
document.querySelector('.sidebar').addEventListener('change', updateSaveBtn);

// Close project dropdown when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('project-dropdown-wrap').contains(e.target)) {
    document.getElementById('project-dropdown').classList.remove('open');
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  fetch('/api/jobs').then(r => r.json()).then(jobs => {
    if (jobs.length) document.getElementById('nav-history').style.display = '';
  }).catch(() => {});
})();

// ── Tab navigation ─────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel-view').forEach(v => v.classList.remove('active'));
  if (tab === 'configure') {
    document.querySelector('[onclick="showTab(\'configure\')"]').classList.add('active');
    document.getElementById(currentJobId ? 'view-running' : 'view-empty').classList.add('active');
  } else if (tab === 'running') {
    document.getElementById('nav-running').classList.add('active');
    document.getElementById('view-running').classList.add('active');
  } else if (tab === 'history') {
    document.getElementById('nav-history').classList.add('active');
    document.getElementById('view-history').classList.add('active');
  }
}

// ── Start job ─────────────────────────────────────────────────────────────────
async function startJob() {
  hideError();
  const siteUrl = document.getElementById('site-url').value.trim();
  if (!siteUrl) { showError('Site URL is required.'); return; }
  if (!siteUrl.startsWith('http')) { showError('Site URL must start with http:// or https://'); return; }

  const body = {
    site_url:   siteUrl,
    timeout_ms: 15000,
  };

  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').textContent = 'Starting…';

  try {
    const res  = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    currentJobId = data.job_id;
    logOffset    = 0;
    resetConsole();
    document.getElementById('nav-running').style.display = '';
    switchPanel('view-running');
    showTab('running');
    startPolling();
  } catch (err) {
    showError(err.message);
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').textContent = 'Run QA Check';
  }
}

// ── Polling ───────────────────────────────────────────────────────────────────
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(poll, 1200);
  poll();
}

async function poll() {
  if (!currentJobId) return;
  try {
    const res  = await fetch(`/api/status/${currentJobId}?since=${logOffset}`);
    if (!res.ok) return;
    const data = await res.json();
    data.logs.forEach(line => appendLog(line));
    logOffset = data.log_count;
    const pct = Math.round(data.progress * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('run-progress-label').textContent = pct + '%';
    if (data.status === 'done') { clearInterval(pollTimer); currentReportUrl = data.report_url; onJobDone(data); }
    else if (data.status === 'error') { clearInterval(pollTimer); onJobError(data); }
  } catch (e) {}
}

function onJobDone(data) {
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('run-progress-label').textContent = '100%';
  document.getElementById('run-spinner').style.display = 'none';
  document.getElementById('run-title').textContent = '✅ QA check complete';
  document.getElementById('console-footer').style.display = 'block';
  document.getElementById('done-status').textContent = '';
  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = 'Run QA Check';
  appendLog('', 'sep');
  appendLog('✅  Report is ready — click "Open Report" to view', 'pass');
}

function onJobError(data) {
  document.getElementById('run-spinner').style.display = 'none';
  document.getElementById('run-title').textContent = '❌ QA check failed';
  document.getElementById('console-footer').style.display = 'block';
  document.getElementById('open-report-btn').style.display = 'none';
  document.getElementById('done-status').textContent = data.error || 'Unknown error';
  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = 'Run QA Check';
}

function resetConsole() {
  document.getElementById('console-body').innerHTML = '';
  document.getElementById('console-footer').style.display = 'none';
  document.getElementById('open-report-btn').style.display = '';
  document.getElementById('run-title').textContent = 'Running QA check…';
  document.getElementById('run-spinner').style.display = '';
  document.getElementById('progress-bar').style.width = '2%';
  document.getElementById('run-progress-label').textContent = '0%';
  document.querySelector('.progress-bar-wrap').classList.add('visible');
}

function appendLog(msg, cls = '') {
  const body = document.getElementById('console-body');
  if (!cls) {
    if (msg.includes('✅'))          cls = 'pass';
    else if (msg.includes('⚠️') || msg.includes('⚠'))  cls = 'warn';
    else if (msg.includes('❌'))     cls = 'fail';
    else if (msg.startsWith('═') || msg.startsWith('─')) cls = 'sep';
    else if (msg.startsWith('📄') || msg.startsWith('🔗') ||
             msg.startsWith('📊') || msg.startsWith('🔍')) cls = 'em';
  }
  const line = document.createElement('div');
  line.className = 'log-line' + (cls ? ' ' + cls : '');
  const emojiMatch = msg.match(/^[\s]*(\p{Emoji_Presentation}[\uFE0F\u20E3]?)\s*/u);
  const icon = document.createElement('span');
  icon.className = 'log-icon';
  const text = document.createElement('span');
  text.className = 'log-text';
  const remaining = emojiMatch ? msg.slice(emojiMatch[0].length) : '';
  const hasMoreEmoji = /\p{Emoji_Presentation}/u.test(remaining);
  if (emojiMatch && !hasMoreEmoji) {
    icon.textContent = emojiMatch[1];
    text.textContent = remaining;
  } else {
    text.textContent = msg.trimStart();
  }
  line.appendChild(icon);
  line.appendChild(text);
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}

// ── Report ────────────────────────────────────────────────────────────────────
function openReport() {
  if (currentReportUrl) window.open(currentReportUrl, '_blank');
}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('history-content');
  try {
    const res  = await fetch('/api/jobs');
    const jobs = await res.json();
    if (!jobs.length) { el.innerHTML = '<div class="history-empty">No checks yet.</div>'; return; }
    document.getElementById('nav-history').style.display = '';
    el.innerHTML = '<div class="history-list">' + jobs.map(j => {
      const favicon = j.favicon_url
        ? `<img class="history-favicon" src="${escHtml(j.favicon_url)}" alt="" onerror="this.outerHTML='<div class=\\'history-favicon-placeholder\\'>🌐</div>'">`
        : `<div class="history-favicon-placeholder">🌐</div>`;
      const pills = (j.status === 'done' && j.total_pass != null) ? `
        <div class="history-pills">
          <span class="history-pill pass">✅ ${j.total_pass}</span>
          <span class="history-pill warn">⚠️ ${j.total_warn}</span>
          <span class="history-pill fail">❌ ${j.total_fail}</span>
        </div>` : '';
      const actions = `
        <div class="history-item-actions">
          ${pills}
          ${j.report_url ? `<button class="history-report-btn" onclick="loadHistoryReport('${j.report_url}')">View report</button>` : `<span class="history-status ${j.status}">${j.status}</span>`}
          ${j.status === 'done' ? `<button class="history-rerun-btn" onclick="rerunJob('${j.id}')">↩ Re-run</button>` : ''}
        </div>`;
      return `
      <div class="history-item">
        ${favicon}
        <div class="history-item-left">
          <div class="site">${escHtml(j.site_url)}</div>
          <div class="date">${formatDate(j.created_at)}</div>
        </div>
        ${actions}
      </div>`;
    }).join('') + '</div>';
  } catch (e) {
    el.innerHTML = '<div class="history-empty">Could not load history.</div>';
  }
}

async function rerunJob(jobId) {
  try {
    const res  = await fetch(`/api/rerun/${jobId}`, { method: 'POST' });
    const data = await res.json();
    if (data.error) { showToast(data.error, true); return; }
    currentJobId = data.job_id;
    logOffset = 0;
    resetConsole();
    document.getElementById('nav-running').style.display = '';
    switchPanel('view-running');
    showTab('running');
    startPolling();
    showToast('Re-running QA check…');
  } catch (e) {
    showToast('Re-run failed: ' + e.message, true);
  }
}

function loadHistoryReport(url) {
  currentReportUrl = url;
  window.open(url, '_blank');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function switchPanel(viewId) {
  document.querySelectorAll('.panel-view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
}
function resetToForm() {
  currentJobId = null;
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  switchPanel('view-empty');
  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = 'Run QA Check';
  showTab('configure');
}
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideError() { document.getElementById('error-banner').classList.remove('visible'); }

function showToast(msg, isError = false) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;
      color:#fff;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;
      white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15)`;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.background = isError ? '#f04438' : '#12b76a';
  toast.style.opacity = '1';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(ts) { return new Date(ts * 1000).toLocaleString(); }
</script>
